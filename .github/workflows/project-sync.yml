name: Sync GitHub Project

on:
  workflow_call:
    inputs:
      issue_url:
        required: false
        type: string
      issue_state:
        required: false
        type: string

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Add issue to Project 4 and update status
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          ISSUE_URL: ${{ inputs.issue_url }}
          ISSUE_STATE: ${{ inputs.issue_state }}
        run: |
          PROJECT_ID="PVT_kwHOAHMMY84BZclp"
          STATUS_FIELD="PVTSSF_lAHOAHMMY84BZclpzhUbK4Y"
          STATUS_REALIZAR="f75ad846"
          STATUS_REALIZADO="98236657"

          ITEM_ID=$(gh api graphql -f query='
            mutation($project:ID!, $url:String!) {
              addProjectV2ItemByUrl(
                input: {projectId: $project, contentUrl: $url}
              ) { item { id } }
            }' \
            -f project="$PROJECT_ID" \
            -f url="$ISSUE_URL" \
            --jq '.data.addProjectV2ItemByUrl.item.id')

          echo "Item ID: $ITEM_ID"

          if [ "$ISSUE_STATE" = "closed" ]; then
            OPTION="$STATUS_REALIZADO"
          else
            OPTION="$STATUS_REALIZAR"
          fi

          gh api graphql -f query='
            mutation($project:ID!, $item:ID!, $field:ID!, $option:String!) {
              updateProjectV2ItemFieldValue(input: {
                projectId: $project,
                itemId: $item,
                fieldId: $field,
                value: { singleSelectOptionId: $option }
              }) { projectV2Item { id } }
            }' \
            -f project="$PROJECT_ID" \
            -f item="$ITEM_ID" \
            -f field="$STATUS_FIELD" \
            -f option="$OPTION"

          gh api graphql -f query='
            mutation($project:ID!, $item:ID!) {
              updateProjectV2ItemPosition(input: {
                projectId: $project,
                itemId: $item,
                afterId: null
              }) { clientMutationId }
            }' \
            -f project="$PROJECT_ID" \
            -f item="$ITEM_ID"
