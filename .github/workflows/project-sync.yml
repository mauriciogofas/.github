name: Sync GitHub Project

on:
  workflow_call:
    inputs:
      issue_node_id:
        required: false
        type: string
      issue_action:
        required: false
        type: string
    secrets:
      PROJECT_TOKEN:
        required: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Add issue to Project 4
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          ISSUE_NODE_ID: ${{ inputs.issue_node_id || github.event.issue.node_id }}
        run: |
          gh api graphql -f query='
            mutation($projectId:ID!, $contentId:ID!) {
              addProjectV2ItemById(input:{projectId:$projectId, contentId:$contentId}) {
                item { id }
              }
            }' \
            -f projectId="PVT_kwHOAHMMY84BZclp" \
            -f contentId="$ISSUE_NODE_ID" \
            --jq '.data.addProjectV2ItemById.item.id' > /tmp/item_id.txt
          echo "ITEM_ID=$(cat /tmp/item_id.txt)" >> $GITHUB_ENV

      - name: Set status based on action
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          ACTION: ${{ inputs.issue_action || github.event.action }}
        run: |
          if [ "$ACTION" = "opened" ] || [ "$ACTION" = "reopened" ]; then
            STATUS_ID="f75ad846"
          elif [ "$ACTION" = "closed" ]; then
            STATUS_ID="98236657"
          else
            echo "Action '$ACTION' has no status mapping, skipping."
            exit 0
          fi

          gh api graphql -f query='
            mutation($projectId:ID!, $itemId:ID!, $fieldId:ID!, $optionId:String!) {
              updateProjectV2ItemFieldValue(input:{
                projectId:$projectId,
                itemId:$itemId,
                fieldId:$fieldId,
                value:{singleSelectOptionId:$optionId}
              }) {
                projectV2Item { id }
              }
            }' \
            -f projectId="PVT_kwHOAHMMY84BZclp" \
            -f itemId="$ITEM_ID" \
            -f fieldId="PVTSSF_lAHOAHMMY84BZclpzhUbK4Y" \
            -f optionId="$STATUS_ID"
