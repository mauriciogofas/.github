name: Auto generate changelog

on:
  workflow_call:

jobs:
  generate_changelog:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PROJECT_TOKEN }}
          ref: master

      - name: Auto generate changelog
        uses: charmixer/auto-changelog-action@v1.2
        with:
          token: ${{ secrets.PROJECT_TOKEN }}
          output: changelog.md
          date_format: '%d/%m/%Y'

      - name: Commit and push
        run: |
          git config user.email "mauricio@gofas.net"
          git config user.name "mauriciogofas"
          git add changelog.md
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m 'ci: update changelog.md'
          git push "https://mauriciogofas:${{ secrets.PROJECT_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:master
