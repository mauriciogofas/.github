name: Auto generate changelog

on:
  workflow_call:
    inputs:
      git_user:
        required: true
        type: string
      git_name:
        required: true
        type: string
      git_email:
        required: true
        type: string
      label_map:
        required: false
        type: string
        default: ''

jobs:
  generate_changelog:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master
          token: ${{ secrets.PROJECT_TOKEN }}

      - name: Generate changelog from issues
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          LABEL_MAP: ${{ inputs.label_map }}
        run: |
          REPO="${{ github.repository }}"

          # Última release
          LAST_RELEASE=$(gh api repos/$REPO/releases/latest --jq '.published_at' 2>/dev/null || echo "")
          LAST_TAG=$(gh api repos/$REPO/releases/latest --jq '.tag_name' 2>/dev/null || echo "")

          # Issues fechadas desde a última release
          if [ -n "$LAST_RELEASE" ]; then
            SINCE="&since=$LAST_RELEASE"
          else
            SINCE=""
          fi

          ISSUES=$(gh api "repos/$REPO/issues?state=closed&per_page=100$SINCE" \
            --jq '.[] | select(.pull_request == null) | {number: .number, title: .title, url: .html_url, labels: [.labels[] | {name: .name, color: .color}]}')

          # Labels do repo com cores
          REPO_LABELS=$(gh api repos/$REPO/labels --paginate \
            --jq '[.[] | {name: .name, color: .color}] | tostring')

          python3 << PYEOF
          import json, os, sys, re
          from datetime import datetime
          from urllib.parse import quote

          issues_raw = """$ISSUES"""
          repo_labels_raw = """$REPO_LABELS"""
          label_map_raw = os.environ.get("LABEL_MAP", "")
          last_tag = "$LAST_TAG"
          repo = "$REPO"

          # Label map customizado
          label_map = {}
          if label_map_raw.strip():
              try:
                  label_map = json.loads(label_map_raw)
              except:
                  pass

          # Labels do repo: {name: color}
          repo_labels = {}
          try:
              for l in json.loads(repo_labels_raw):
                  repo_labels[l["name"]] = l["color"]
          except:
              pass

          # Badge shields.io para uma label
          def badge(name, color):
              display = label_map.get(name, name)
              safe_name = quote(display.replace("-", "--").replace("_", "__").replace(" ", "_"))
              return f"![{display}](https://img.shields.io/badge/{safe_name}-{color}?style=flat-square)"

          # Parsear issues
          issues = []
          for line in issues_raw.strip().splitlines():
              line = line.strip()
              if not line:
                  continue
              try:
                  issues.append(json.loads(line))
              except:
                  pass

          if not issues:
              print("Nenhuma issue para processar.")
              sys.exit(0)

          # Agrupar por primeira label — cada issue aparece só uma vez
          # Badge de todas as labels aparece ao lado
          categorized = {}   # label_name -> [issues]
          uncategorized = []
          placed = set()

          for issue in issues:
              labels = issue.get("labels", [])
              if not labels:
                  uncategorized.append(issue)
              else:
                  first = labels[0]["name"]
                  if first not in categorized:
                      categorized[first] = []
                  categorized[first].append(issue)

          # Ler changelog.md existente — preservar apenas blocos de release (## [vX.Y.Z])
          try:
              with open("changelog.md", "r") as f:
                  existing = f.read()
          except:
              existing = ""

          # Remover tudo antes do primeiro bloco de release versionado
          history_match = re.search(r'(## \[v\d)', existing)
          history = existing[history_match.start():].strip() if history_match else ""

          # Montar novo bloco Unreleased
          today = datetime.now().strftime("%d/%m/%Y")
          lines = ["# Changelog\n"]
          lines.append(f"## [Unreleased](https://github.com/{repo}/tree/HEAD) — {today}\n")
          if last_tag:
              lines.append(f"[Full Changelog](https://github.com/{repo}/compare/{last_tag}...HEAD)\n")

          # Ordem: labels na ordem em que aparecem no repo
          for label_name, label_color in repo_labels.items():
              if label_name not in categorized:
                  continue
              section_title = label_map.get(label_name, label_name)
              lines.append(f"\n**{section_title}:**\n")
              for issue in categorized[label_name]:
                  all_badges = " ".join(
                      badge(l["name"], l["color"])
                      for l in issue["labels"]
                  )
                  lines.append(f"- {issue['title']} [\\#{issue['number']}]({issue['url']}) {all_badges}")

          # Labels fora do repo (edge case)
          extra = [l for l in categorized if l not in repo_labels]
          for label_name in extra:
              section_title = label_map.get(label_name, label_name)
              lines.append(f"\n**{section_title}:**\n")
              for issue in categorized[label_name]:
                  all_badges = " ".join(
                      badge(l["name"], l["color"])
                      for l in issue["labels"]
                  )
                  lines.append(f"- {issue['title']} [\\#{issue['number']}]({issue['url']}) {all_badges}")

          # Sem label
          if uncategorized:
              lines.append(f"\n**Outros:**\n")
              for issue in uncategorized:
                  lines.append(f"- {issue['title']} [\\#{issue['number']}]({issue['url']})")

          new_block = "\n".join(lines)
          final = new_block + ("\n\n" + history if history else "") + "\n"

          with open("changelog.md", "w") as f:
              f.write(final)

          print("changelog.md gerado com sucesso.")
          PYEOF

      - name: Commit and push
        env:
          PUSH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          GIT_USER: ${{ inputs.git_user }}
          GIT_NAME: ${{ inputs.git_name }}
          GIT_EMAIL: ${{ inputs.git_email }}
        run: |
          git config user.email "$GIT_EMAIL"
          git config user.name "$GIT_NAME"
          git add changelog.md
          git diff --staged --quiet && echo "No changes to changelog.md" && exit 0
          git commit -m 'ci: update changelog.md'
          git push "https://${GIT_USER}:${PUSH_TOKEN}@github.com/${{ github.repository }}.git" HEAD:master
