name: Auto generate changelog

on:
  workflow_call:
    inputs:
      git_user:
        required: true
        type: string
      git_name:
        required: true
        type: string
      git_email:
        required: true
        type: string
      label_map:
        required: false
        type: string
        default: ''
      section_map:
        required: false
        type: string
        default: ''

jobs:
  generate_changelog:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master
          token: ${{ secrets.PROJECT_TOKEN }}

      - name: Generate changelog from issues
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          LABEL_MAP: ${{ inputs.label_map }}
          SECTION_MAP: ${{ inputs.section_map }}
        run: |
          REPO="${{ github.repository }}"

          LAST_RELEASE=$(gh api repos/$REPO/releases/latest --jq '.published_at' 2>/dev/null || echo "")
          LAST_TAG=$(gh api repos/$REPO/releases/latest --jq '.tag_name' 2>/dev/null || echo "")

          if [ -n "$LAST_RELEASE" ]; then
            SINCE="&since=$LAST_RELEASE"
          else
            SINCE=""
          fi

          ISSUES=$(gh api "repos/$REPO/issues?state=closed&per_page=100$SINCE" \
            --jq '.[] | select(.pull_request == null) | {number: .number, title: .title, url: .html_url, labels: [.labels[] | {name: .name, color: .color}]}')

          REPO_LABELS=$(gh api repos/$REPO/labels --paginate \
            --jq '[.[] | {name: .name, color: .color}] | tostring')

          python3 << PYEOF
          import json, os, sys, re
          from urllib.parse import quote

          issues_raw = """$ISSUES"""
          repo_labels_raw = """$REPO_LABELS"""
          label_map_raw = os.environ.get("LABEL_MAP", "")
          section_map_raw = os.environ.get("SECTION_MAP", "")
          last_tag = "$LAST_TAG"
          repo = "$REPO"

          # label_map: renomeia o badge
          label_map = {}
          if label_map_raw.strip():
              try:
                  label_map = json.loads(label_map_raw)
              except:
                  pass

          # section_map: título da seção — "enhancement" vem antes de "bug"
          default_section_map = {
              "enhancement": "Melhorias",
              "bug": "Correções",
              "documentation": "Documentação",
              "duplicate": "Duplicados",
              "good first issue": "Boas entradas",
              "help wanted": "Precisa de ajuda",
              "invalid": "Inválidos",
              "question": "Dúvidas",
              "wontfix": "Não será corrigido",
          }
          section_map = dict(default_section_map)
          if section_map_raw.strip():
              try:
                  section_map.update(json.loads(section_map_raw))
              except:
                  pass

          # Labels do repo preservando ordem de inserção
          repo_labels = {}
          try:
              for l in json.loads(repo_labels_raw):
                  repo_labels[l["name"]] = l["color"]
          except:
              pass

          def badge(name, color):
              display = label_map.get(name, name)
              safe = quote(display.replace("-", "--").replace("_", "__").replace(" ", "_"))
              hex_color = color.lstrip("#").upper()
              if len(hex_color) not in (3, 6):
                  hex_color = "555555"
              filter_url = f"https://github.com/{repo}/issues?q=is%3Aissue%20state%3Aclosed%20label%3A{quote(name)}"
              return f"[![{display}](https://img.shields.io/badge/{safe}-{hex_color}?style=flat-square&labelColor={hex_color}&color={hex_color})]({filter_url})"

          # Parsear issues
          issues = []
          for line in issues_raw.strip().splitlines():
              line = line.strip()
              if not line:
                  continue
              try:
                  issues.append(json.loads(line))
              except:
                  pass

          if not issues:
              print("Nenhuma issue para processar.")
              sys.exit(0)

          # Ordem de prioridade das seções
          ordered_labels = list(default_section_map.keys())
          extra_labels = [l for l in repo_labels if l not in ordered_labels]
          label_order = ordered_labels + extra_labels

          # Agrupar pela label de maior prioridade segundo label_order
          # Cada issue aparece só uma vez, na seção de maior prioridade
          categorized = {}
          uncategorized = []

          for issue in issues:
              labels = issue.get("labels", [])
              if not labels:
                  uncategorized.append(issue)
              else:
                  label_names = [l["name"] for l in labels]
                  # Encontrar a label de maior prioridade na label_order
                  primary = next(
                      (l for l in label_order if l in label_names),
                      label_names[0]  # fallback: primeira retornada pela API
                  )
                  if primary not in categorized:
                      categorized[primary] = []
                  categorized[primary].append(issue)

          # Preservar apenas blocos de release versionados — remover tudo que não corresponde ao padrão
          try:
              with open("changelog.md", "r") as f:
                  existing = f.read()
          except:
              existing = ""

          history_match = re.search(r'(## \[v\d+\.\d+\.\d+\])', existing)
          history = existing[history_match.start():].strip() if history_match else ""
          # Remover rodapé do charmixer em qualquer variação
          history = re.sub(r'\n+\\\\?\* \*This Changelog[^\n]*', '', history).strip()
          history = re.sub(r'\n+\\\* \*This Changelog[^\n]*', '', history).strip()

          # Reordenar seções: usar ordem do section_map (enhancement antes de bug)
          # Montar novo bloco
          lines = ["# Changelog\n"]
          lines.append(f"## [Próxima release](https://github.com/{repo}/tree/HEAD)\n")
          if last_tag:
              lines.append(f"[Changelog detalhado](https://github.com/{repo}/compare/{last_tag}...HEAD)\n")

          for label_name in label_order:
              if label_name not in categorized:
                  continue
              label_color = repo_labels.get(label_name, "555555")
              section_title = section_map.get(label_name, label_name)
              lines.append(f"\n**{section_title}:**\n")
              for issue in categorized[label_name]:
                  all_badges = " ".join(
                      badge(l["name"], l["color"])
                      for l in issue["labels"]
                  )
                  lines.append(f"- {issue['title']} [\\#{issue['number']}]({issue['url']}) {all_badges}")

          # Labels fora do section_map
          extra = [l for l in categorized if l not in label_order]
          for label_name in extra:
              section_title = section_map.get(label_name, label_name)
              lines.append(f"\n**{section_title}:**\n")
              for issue in categorized[label_name]:
                  all_badges = " ".join(
                      badge(l["name"], l["color"])
                      for l in issue["labels"]
                  )
                  lines.append(f"- {issue['title']} [\\#{issue['number']}]({issue['url']}) {all_badges}")

          if uncategorized:
              lines.append(f"\n**Outros:**\n")
              for issue in uncategorized:
                  lines.append(f"- {issue['title']} [\\#{issue['number']}]({issue['url']})")

          new_block = "\n".join(lines)
          final = new_block + ("\n\n" + history if history else "") + "\n"

          with open("changelog.md", "w") as f:
              f.write(final)

          print("changelog.md gerado com sucesso.")


      - name: Commit and push
        env:
          PUSH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          GIT_USER: ${{ inputs.git_user }}
          GIT_NAME: ${{ inputs.git_name }}
          GIT_EMAIL: ${{ inputs.git_email }}
        run: |
          git config user.email "$GIT_EMAIL"
          git config user.name "$GIT_NAME"
          git add changelog.md
          git diff --staged --quiet && echo "No changes to changelog.md" && exit 0
          git commit -m 'ci: update changelog.md'
          # Pull antes do push para evitar conflito em runs concorrentes
          git pull --rebase "https://${GIT_USER}:${PUSH_TOKEN}@github.com/${{ github.repository }}.git" master || true
          git push "https://${GIT_USER}:${PUSH_TOKEN}@github.com/${{ github.repository }}.git" HEAD:master
