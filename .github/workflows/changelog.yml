name: Auto generate changelog

on:
  workflow_call:
    inputs:
      git_user:
        required: true
        type: string
      git_name:
        required: true
        type: string
      git_email:
        required: true
        type: string
      section_map:
        required: false
        type: string
        default: ''

jobs:
  generate_changelog:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master
          token: ${{ secrets.PROJECT_TOKEN }}

      - name: Generate changelog from issues
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          SECTION_MAP: ${{ inputs.section_map }}
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_DATE: ${{ github.event.release.published_at }}
        run: |
          REPO="${{ github.repository }}"

          ALL_RELEASES=$(gh api repos/$REPO/releases --paginate \
            --jq '[.[] | {tag: .tag_name, date: .published_at}] | sort_by(.date)' 2>/dev/null || echo "[]")

          REPO_LABELS=$(gh api repos/$REPO/labels --paginate \
            --jq '[.[] | {name: .name, color: .color}] | tostring')

          python3 - << PYEOF
import json, os, sys, re, subprocess
from urllib.parse import quote
from datetime import datetime

repo = "$REPO"
event_name = os.environ.get("EVENT_NAME", "")
release_tag = os.environ.get("RELEASE_TAG", "")
release_name = os.environ.get("RELEASE_NAME", "")
release_date_raw = os.environ.get("RELEASE_DATE", "")
section_map_raw = os.environ.get("SECTION_MAP", "")
all_releases_raw = r"""$ALL_RELEASES"""
repo_labels_raw = r"""$REPO_LABELS"""

default_section_map = {
    "enhancement": "Melhorias",
    "bug": "Correções",
    "documentation": "Documentação",
    "duplicate": "Duplicados",
    "good first issue": "Boas entradas",
    "help wanted": "Precisa de ajuda",
    "invalid": "Inválidos",
    "question": "Dúvidas",
    "wontfix": "Não será corrigido",
}
section_map = dict(default_section_map)
if section_map_raw.strip():
    try:
        section_map.update(json.loads(section_map_raw))
    except:
        pass

repo_labels = {}
try:
    for l in json.loads(repo_labels_raw):
        repo_labels[l["name"]] = l["color"]
except:
    pass

ordered_labels = list(default_section_map.keys())
extra_labels = [l for l in repo_labels if l not in ordered_labels]
label_order = ordered_labels + extra_labels

all_releases = []
try:
    all_releases = json.loads(all_releases_raw)
except:
    pass

def label_tag(name):
    return f"`{name}`"

def fetch_issues(since=None, until=None):
    url = f"repos/{repo}/issues?state=closed&per_page=100"
    if since:
        url += f"&since={since}"
    result = subprocess.run(
        ["gh", "api", url, "--paginate", "--jq",
         '.[] | select(.pull_request == null) | {number: .number, title: .title, url: .html_url, closed_at: .closed_at, labels: [.labels[] | {name: .name, color: .color}]}'],
        capture_output=True, text=True
    )
    issues = []
    for line in result.stdout.strip().splitlines():
        line = line.strip()
        if not line:
            continue
        try:
            issue = json.loads(line)
            if until and issue.get("closed_at", "") > until:
                continue
            issues.append(issue)
        except:
            pass
    return issues

def build_section(issues):
    categorized = {}
    uncategorized = []
    for issue in issues:
        labels = issue.get("labels", [])
        if not labels:
            uncategorized.append(issue)
        else:
            label_names = [l["name"] for l in labels]
            primary = next((l for l in label_order if l in label_names), label_names[0])
            if primary not in categorized:
                categorized[primary] = []
            categorized[primary].append(issue)

    lines = []
    for label_name in label_order:
        if label_name not in categorized:
            continue
        section_title = section_map.get(label_name, label_name)
        lines.append(f"\n**{section_title}:**\n")
        for issue in categorized[label_name]:
            tags = " ".join(label_tag(l["name"]) for l in issue["labels"])
            lines.append(f"- {tags} {issue['title']} [\\#{issue['number']}]({issue['url']})")

    extra = [l for l in categorized if l not in label_order]
    for label_name in extra:
        section_title = section_map.get(label_name, label_name)
        lines.append(f"\n**{section_title}:**\n")
        for issue in categorized[label_name]:
            tags = " ".join(label_tag(l["name"]) for l in issue["labels"])
            lines.append(f"- {tags} {issue['title']} [\\#{issue['number']}]({issue['url']})")

    if uncategorized:
        lines.append(f"\n**Outros:**\n")
        for issue in uncategorized:
            lines.append(f"- {issue['title']} [\\#{issue['number']}]({issue['url']})")

    return lines

try:
    with open("changelog.md", "r") as f:
        existing = f.read()
except:
    existing = ""

history_match = re.search(r'(## \[v\d+\.\d+\.\d+\])', existing)
history = existing[history_match.start():].strip() if history_match else ""
history = re.sub(r'\n+\\\\?\* \*This Changelog[^\n]*', '', history).strip()

output_lines = ["# Changelog\n"]

if event_name == "release" and release_tag:
    prev_tag = None
    prev_date = None
    for i, r in enumerate(all_releases):
        if r["tag"] == release_tag and i > 0:
            prev_tag = all_releases[i-1]["tag"]
            prev_date = all_releases[i-1]["date"]
            break

    release_date = release_date_raw[:10] if release_date_raw else ""
    try:
        release_date = datetime.strptime(release_date_raw[:10], "%Y-%m-%d").strftime("%d/%m/%Y")
    except:
        pass

    issues = fetch_issues(since=prev_date, until=release_date_raw)
    display_name = release_name if release_name else release_tag
    compare = f"https://github.com/{repo}/compare/{prev_tag}...{release_tag}" if prev_tag else f"https://github.com/{repo}/releases/tag/{release_tag}"

    output_lines.append(f"## [{display_name}](https://github.com/{repo}/releases/tag/{release_tag}) ({release_date})\n")
    section_lines = build_section(issues)
    output_lines.extend(section_lines)
    output_lines.append(f"\n[Changelog detalhado]({compare})\n")

else:
    last_tag = all_releases[-1]["tag"] if all_releases else ""
    last_date = all_releases[-1]["date"] if all_releases else None
    issues = fetch_issues(since=last_date)

    output_lines.append(f"## [Próxima release](https://github.com/{repo}/tree/HEAD)\n")
    section_lines = build_section(issues)
    output_lines.extend(section_lines)
    if last_tag:
        output_lines.append(f"\n[Changelog detalhado](https://github.com/{repo}/compare/{last_tag}...HEAD)\n")

final = "\n".join(output_lines)
final += ("\n\n" + history if history else "") + "\n"

with open("changelog.md", "w") as f:
    f.write(final)

print("changelog.md gerado com sucesso.")
PYEOF

      - name: Commit and push
        env:
          PUSH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          GIT_USER: ${{ inputs.git_user }}
          GIT_NAME: ${{ inputs.git_name }}
          GIT_EMAIL: ${{ inputs.git_email }}
        run: |
          git config user.email "$GIT_EMAIL"
          git config user.name "$GIT_NAME"
          git add changelog.md
          git diff --staged --quiet && echo "No changes to changelog.md" && exit 0
          git commit -m 'ci: update changelog.md'
          git pull --rebase "https://${GIT_USER}:${PUSH_TOKEN}@github.com/${{ github.repository }}.git" master || true
          git push "https://${GIT_USER}:${PUSH_TOKEN}@github.com/${{ github.repository }}.git" HEAD:master
