name: Auto generate changelog

on:
  workflow_call:
    inputs:
      git_user:
        required: true
        type: string
      git_name:
        required: true
        type: string
      git_email:
        required: true
        type: string
      section_map:
        required: false
        type: string
        default: ''

jobs:
  generate_changelog:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master
          token: ${{ secrets.PROJECT_TOKEN }}

      - name: Write changelog script
        run: |
          cat > /tmp/gen_changelog.py << 'PYEOF'
          import json, os, sys, re, subprocess
          from urllib.parse import quote
          from datetime import datetime

          repo        = os.environ["REPO"]
          event_name  = os.environ.get("EVENT_NAME", "")
          release_tag = os.environ.get("RELEASE_TAG", "")
          release_name= os.environ.get("RELEASE_NAME", "")
          release_date_raw = os.environ.get("RELEASE_DATE", "")
          section_map_raw  = os.environ.get("SECTION_MAP", "")

          def gh_json(url):
              r = subprocess.run(["gh", "api", url, "--paginate"], capture_output=True, text=True)
              try:
                  return json.loads(r.stdout)
              except:
                  return []

          all_releases_data = gh_json(f"repos/{repo}/releases")
          all_releases = sorted(
              [{"tag": r["tag_name"], "date": r["published_at"]} for r in all_releases_data],
              key=lambda x: x["date"]
          )

          repo_labels_data = gh_json(f"repos/{repo}/labels")
          repo_labels = {l["name"]: l["color"] for l in repo_labels_data}

          default_section_map = {
              "enhancement": "Melhorias",
              "melhoria":    "Melhorias",
              "bug":         "Correções",
              "documentation": "Documentação",
              "docs":        "Documentação",
              "duplicate":   "Duplicados",
              "duplicado":   "Duplicados",
              "good first issue": "Boas entradas",
              "help wanted": "Precisa de ajuda",
              "invalid":     "Inválidos",
              "question":    "Dúvidas",
              "wontfix":     "Não será corrigido",
          }
          section_map = dict(default_section_map)
          if section_map_raw.strip():
              try:
                  section_map.update(json.loads(section_map_raw))
              except:
                  pass

          ordered_labels = list(default_section_map.keys())
          extra_labels   = [l for l in repo_labels if l not in ordered_labels]
          label_order    = ordered_labels + extra_labels

          def fetch_issues(since=None, until=None):
              url = f"repos/{repo}/issues?state=closed&per_page=100"
              if since:
                  url += f"&since={since}"
              r = subprocess.run(
                  ["gh", "api", url, "--paginate", "--jq",
                   '.[] | select(.pull_request == null) | {number:.number,title:.title,url:.html_url,closed_at:.closed_at,labels:[.labels[]|{name:.name}]}'],
                  capture_output=True, text=True
              )
              issues = []
              for line in r.stdout.strip().splitlines():
                  line = line.strip()
                  if not line:
                      continue
                  try:
                      issue = json.loads(line)
                      if until and issue.get("closed_at","") > until:
                          continue
                      issues.append(issue)
                  except:
                      pass
              return issues

          def label_tag(name):
              return f"`{name}`"

          def build_section(issues):
              categorized  = {}
              uncategorized = []
              for issue in issues:
                  labels = issue.get("labels", [])
                  if not labels:
                      uncategorized.append(issue)
                  else:
                      names   = [l["name"] for l in labels]
                      primary = next((l for l in label_order if l in names), names[0])
                      categorized.setdefault(primary, []).append(issue)

              lines = []
              for lname in label_order:
                  if lname not in categorized:
                      continue
                  title = section_map.get(lname, lname)
                  lines.append(f"\n**{title}:**\n")
                  for issue in categorized[lname]:
                      tags = " ".join(label_tag(l["name"]) for l in issue["labels"])
                      num  = issue["number"]
                      lines.append(f"- {tags} {issue['title']} [\\#{num}]({issue['url']})")

              extra = [l for l in categorized if l not in label_order]
              for lname in extra:
                  title = section_map.get(lname, lname)
                  lines.append(f"\n**{title}:**\n")
                  for issue in categorized[lname]:
                      tags = " ".join(label_tag(l["name"]) for l in issue["labels"])
                      num  = issue["number"]
                      lines.append(f"- {tags} {issue['title']} [\\#{num}]({issue['url']})")

              if uncategorized:
                  lines.append(f"\n**Outros:**\n")
                  for issue in uncategorized:
                      num = issue["number"]
                      lines.append(f"- {issue['title']} [\\#{num}]({issue['url']})")
              return lines

          # Preservar histórico de releases versionadas
          try:
              with open("changelog.md") as f:
                  existing = f.read()
          except:
              existing = ""

          hm = re.search(r'(## \[v\d+\.\d+\.\d+\])', existing)
          history = existing[hm.start():].strip() if hm else ""
          history = re.sub(r'\n+\\*\s*\*This Changelog[^\n]*', '', history).strip()

          out = ["# Changelog\n"]

          if event_name == "release" and release_tag:
              prev_tag = prev_date = None
              for i, r in enumerate(all_releases):
                  if r["tag"] == release_tag and i > 0:
                      prev_tag  = all_releases[i-1]["tag"]
                      prev_date = all_releases[i-1]["date"]
                      break

              rd = release_date_raw[:10] if release_date_raw else ""
              try:
                  rd = datetime.strptime(rd, "%Y-%m-%d").strftime("%d/%m/%Y")
              except:
                  pass

              issues   = fetch_issues(since=prev_date, until=release_date_raw)
              dname    = release_name if release_name else release_tag
              compare  = (f"https://github.com/{repo}/compare/{prev_tag}...{release_tag}"
                          if prev_tag else f"https://github.com/{repo}/releases/tag/{release_tag}")

              out.append(f"## [{dname}](https://github.com/{repo}/releases/tag/{release_tag}) ({rd})\n")
              out.extend(build_section(issues))
              out.append(f"\n[Changelog detalhado]({compare})\n")

          else:
              last_tag  = all_releases[-1]["tag"]  if all_releases else ""
              last_date = all_releases[-1]["date"] if all_releases else None
              issues    = fetch_issues(since=last_date)

              out.append(f"## [Próxima release](https://github.com/{repo}/tree/HEAD)\n")
              out.extend(build_section(issues))
              if last_tag:
                  out.append(f"\n[Changelog detalhado](https://github.com/{repo}/compare/{last_tag}...HEAD)\n")

          final = "\n".join(out)
          final += ("\n\n" + history if history else "") + "\n"

          with open("changelog.md", "w") as f:
              f.write(final)

          print("changelog.md gerado com sucesso.")
          PYEOF

      - name: Generate changelog from issues
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          SECTION_MAP: ${{ inputs.section_map }}
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_DATE: ${{ github.event.release.published_at }}
          REPO: ${{ github.repository }}
        run: python3 /tmp/gen_changelog.py

      - name: Commit and push
        env:
          PUSH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          GIT_USER: ${{ inputs.git_user }}
          GIT_NAME: ${{ inputs.git_name }}
          GIT_EMAIL: ${{ inputs.git_email }}
        run: |
          git config user.email "$GIT_EMAIL"
          git config user.name "$GIT_NAME"
          git add changelog.md
          git diff --staged --quiet && echo "No changes to changelog.md" && exit 0
          git commit -m 'ci: update changelog.md'
          git pull --rebase "https://${GIT_USER}:${PUSH_TOKEN}@github.com/${{ github.repository }}.git" master || true
          git push "https://${GIT_USER}:${PUSH_TOKEN}@github.com/${{ github.repository }}.git" HEAD:master
