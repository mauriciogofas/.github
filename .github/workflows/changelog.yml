name: Auto generate changelog

on:
  workflow_call:
    inputs:
      git_user:
        required: true
        type: string
      git_name:
        required: true
        type: string
      git_email:
        required: true
        type: string
      section_map:
        required: false
        type: string
        default: ''

jobs:
  generate_changelog:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master

      - name: Write changelog script
        run: |
          cat > /tmp/gen_changelog.py << 'PYEOF'
          import json, os, sys, re, subprocess
          from urllib.parse import quote
          from datetime import datetime

          repo         = os.environ["REPO"]
          event_name   = os.environ.get("EVENT_NAME", "")
          release_tag  = os.environ.get("RELEASE_TAG", "")
          section_map_raw = os.environ.get("SECTION_MAP", "")

          BUG_KEYWORDS = {"bug", "erro", "error", "fix", "hotfix"}

          def is_bug_label(name):
              return any(kw in name.lower() for kw in BUG_KEYWORDS)

          def gh_json(url):
              r = subprocess.run(["gh", "api", url, "--paginate"], capture_output=True, text=True)
              try:
                  return json.loads(r.stdout)
              except:
                  return []

          def fmt_date(iso):
              try:
                  return datetime.strptime(iso[:10], "%Y-%m-%d").strftime("%d/%m/%Y")
              except:
                  return iso[:10]

          # Carregar dados
          all_releases_data = gh_json(f"repos/{repo}/releases")
          all_releases = sorted(
              [{"tag": r["tag_name"], "name": r.get("name","") or r["tag_name"],
                "date": r["published_at"], "url": r["html_url"]}
               for r in all_releases_data],
              key=lambda x: x["date"]
          )

          # section_map customizado
          extra_section_map = {}
          if section_map_raw.strip():
              try:
                  extra_section_map = json.loads(section_map_raw)
              except:
                  pass

          def fetch_issues(since=None, until=None):
              url = f"repos/{repo}/issues?state=closed&per_page=100"
              if since:
                  url += f"&since={since}"
              r = subprocess.run(
                  ["gh", "api", url, "--paginate", "--jq",
                   '.[] | select(.pull_request == null) | {number:.number,title:.title,url:.html_url,closed_at:.closed_at,labels:[.labels[]|{name:.name}]}'],
                  capture_output=True, text=True
              )
              issues = []
              for line in r.stdout.strip().splitlines():
                  line = line.strip()
                  if not line:
                      continue
                  try:
                      issue = json.loads(line)
                      if until and issue.get("closed_at","") > until:
                          continue
                      issues.append(issue)
                  except:
                      pass
              return issues

          def label_tag(name):
              filter_url = f"https://github.com/{repo}/issues?q=is%3Aissue+state%3Aclosed+label%3A{quote(name)}"
              return f'<a href="{filter_url}" style="color:#a99c9c;text-decoration:none"><code>{name}</code></a>'  

          # Labels padrão que classificam o issue como Melhorias ou Correções
          MELHORIA_LABELS = {"melhoria", "melhorias", "enhancement"}

          def has_melhoria_label(names):
              return any(n.lower() in MELHORIA_LABELS for n in names)

          def fmt_issue(issue):
              num  = issue["number"]
              tags = " ".join(label_tag(l["name"]) for l in issue["labels"])
              suffix = f" {tags}" if tags else ""
              return f"- {issue['title']} - [#{num}]({issue['url']}){suffix}"

          def build_section(issues):
              if not issues:
                  return []
              melhorias   = []
              correcoes   = []
              # issues sem nenhuma label padrão: agrupa por label não-padrão
              extra_by_label = {}  # label_name -> [issues]
              vale_mencionar = []  # labels avulsas (sem grupo >= 2)

              for issue in issues:
                  labels = issue.get("labels", [])
                  names  = [l["name"] for l in labels]
                  if not names:
                      melhorias.append(issue)  # sem label: default Melhorias
                  elif has_melhoria_label(names):
                      melhorias.append(issue)  # label explícita de melhoria
                  elif any(is_bug_label(n) for n in names):
                      correcoes.append(issue)  # label de bug/fix
                  else:
                      # Label não-padrão — candidato a seção extra
                      key = names[0]
                      extra_by_label.setdefault(key, []).append(issue)

              # Separar grupos com 2+ issues de avulsos
              grouped_extras  = {k: v for k, v in extra_by_label.items() if len(v) >= 2}
              singles         = [issue for v in extra_by_label.values() if len(v) < 2 for issue in v]

              lines = []
              # Seções padrão
              for title, group in [("Melhorias", melhorias), ("Correções", correcoes)]:
                  if not group:
                      continue
                  lines.append(f"\n**{title}:**\n")
                  for issue in group:
                      lines.append(fmt_issue(issue))

              # Seções extras por label (2+ issues)
              for label_name, group in grouped_extras.items():
                  title = label_name.capitalize()
                  lines.append(f"\n**{title}:**\n")
                  for issue in group:
                      lines.append(fmt_issue(issue))

              # Seção "Vale mencionar" para avulsos
              if singles:
                  lines.append(f"\n**Vale mencionar:**\n")
                  for issue in singles:
                      lines.append(fmt_issue(issue))

              return lines

          # Montar changelog completo do zero
          out = ["# Changelog\n"]

          # Bloco "Próxima atualização" — issues após última release
          last_tag  = all_releases[-1]["tag"]  if all_releases else ""
          last_date = all_releases[-1]["date"] if all_releases else None
          unreleased = fetch_issues(since=last_date)

          unreleased_lines = build_section(unreleased)
          if unreleased_lines:
              out.append(f"## [Próxima atualização](https://github.com/{repo}/tree/HEAD)\n")
              out.extend(unreleased_lines)
              if last_tag:
                  out.append(f"\n[Comparar versões](https://github.com/{repo}/compare/{last_tag}...HEAD)\n")

          # Blocos de releases — do mais recente para o mais antigo
          for i in range(len(all_releases) - 1, -1, -1):
              rel      = all_releases[i]
              prev     = all_releases[i-1] if i > 0 else None
              prev_tag = prev["tag"]  if prev else None
              prev_date= prev["date"] if prev else None

              issues = fetch_issues(since=prev_date, until=rel["date"])
              rd      = fmt_date(rel["date"])
              compare = (f"https://github.com/{repo}/compare/{prev_tag}...{rel['tag']}"
                         if prev_tag else f"https://github.com/{repo}/releases/tag/{rel['tag']}")

              out.append(f"## [{rel['name']} - {rd}]({rel['url']})\n")
              section_lines = build_section(issues)
              out.extend(section_lines)
              out.append(f"\n[Comparar versões]({compare})\n")

          final = "\n".join(out) + "\n"

          with open("changelog.md", "w") as f:
              f.write(final)

          print(f"changelog.md gerado: {len(all_releases)} releases, {len(unreleased)} issues pendentes.")
          PYEOF

      - name: Generate changelog from issues
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          SECTION_MAP: ${{ inputs.section_map }}
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_DATE: ${{ github.event.release.published_at }}
          REPO: ${{ github.repository }}
        run: python3 /tmp/gen_changelog.py

      - name: Commit and push
        env:
          PUSH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          GIT_USER: ${{ inputs.git_user }}
          GIT_NAME: ${{ inputs.git_name }}
          GIT_EMAIL: ${{ inputs.git_email }}
        run: |
          git config user.email "$GIT_EMAIL"
          git config user.name "$GIT_NAME"
          git add changelog.md
          git diff --staged --quiet && echo "No changes to changelog.md" && exit 0
          git commit -m 'ci: update changelog.md'
          git pull --rebase "https://${GIT_USER}:${PUSH_TOKEN}@github.com/${{ github.repository }}.git" master || true
          git push "https://${GIT_USER}:${PUSH_TOKEN}@github.com/${{ github.repository }}.git" HEAD:master
